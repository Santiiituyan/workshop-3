version: "3.8"

services:

  # ────────────────────────────────────────────────
  # Zookeeper — required by Kafka for coordination
  # ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - etl_network

  # ────────────────────────────────────────────────
  # Kafka Broker
  # ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal traffic (container-to-container) uses kafka:29092
      # External traffic (your Python scripts) uses localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - etl_network

  # ────────────────────────────────────────────────
  # PostgreSQL — stores raw events and predictions
  # ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      # Runs create_tables.sql automatically on first startup
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etl_network

# ────────────────────────────────────────────────
# Shared network
# ────────────────────────────────────────────────
networks:
  etl_network:
    driver: bridge

# ────────────────────────────────────────────────
# Named volume for PostgreSQL persistence
# ────────────────────────────────────────────────
volumes:
  postgres_data:
